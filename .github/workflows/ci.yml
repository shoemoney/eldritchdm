# EldritchDM CI — Phase 24 / POLISH-01.
#
# Two-tier strategy:
#  1. `test` matrix (macos-latest + ubuntu-latest × Python 3.11) installs
#     ONLY the `[dev]` extra. This is the default off-path; the Linux
#     runner is what verifies the Phase 14 FLAKE-01 skip-gates behave
#     cleanly when `[mac-ocr]` / `[observability]` are absent.
#  2. `extras-mac` job installs `[mac-ocr]` + `[observability]` on macOS
#     to exercise the full-stack on-path. Marked `continue-on-error: true`
#     so flaky native extras (ocrmac, PyObjC) never block a merge — it's
#     informational only.
#
# Linux runner additionally runs:
#   - scripts/ci/check_safe_yaml.sh     (Phase 8 — yaml.safe_load gate)
#   - scripts/ci/check_summary_frontmatter.sh (Phase 14 — SUMMARY frontmatter gate)
name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install project (dev extras only — NO mac-ocr, NO observability)
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check src/ tests/ run.py

      - name: Import-linter
        run: uv run lint-imports

      - name: Pytest with coverage
        # --timeout=120 fails individual tests after 2 min instead of hanging the whole job
        # for 6h. v1.14.1 added --cov which exposed a coverage-instrumentation hang on at
        # least one test; --timeout surfaces the offending test in logs instead of masking it.
        # --timeout-method=thread is required for asyncio tests (signal method deadlocks them).
        run: uv run pytest tests/ -q --timeout=120 --timeout-method=thread --cov=eldritch_dm --cov-report=term --cov-report=xml:coverage.xml

      - name: Upload coverage artifact (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Safe-YAML gate (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/ci/check_safe_yaml.sh

      - name: SUMMARY frontmatter gate (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/ci/check_summary_frontmatter.sh

  extras-mac:
    name: extras-mac (informational)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install project (dev + mac-ocr + observability)
        run: |
          uv venv
          uv pip install -e ".[dev,mac-ocr,observability]"

      - name: Pytest with coverage (full extras)
        run: uv run pytest tests/ -q --timeout=120 --timeout-method=thread --cov=eldritch_dm --cov-report=term
