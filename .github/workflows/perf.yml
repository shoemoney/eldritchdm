# EldritchDM perf-regression workflow — Phase 28 / TUNE-03 / D-219.
#
# Runs the `eldritch-dm-perf-baseline` CLI against the committed v1.9.0
# baseline JSON. Triggers:
#   1. Weekly schedule — Sundays 02:00 UTC.
#   2. Push to main, only when commit message contains "[perf]".
#
# Status is informational (not release-blocking) per D-219 — perf is
# operator-tunable, not a correctness contract. A failing run signals
# that the baseline has drifted ≥10% (warn) or ≥25% (critical) on at
# least one p99; investigate before committing a new baseline.
#
# Single job on macos-latest (the primary target). The profiler uses
# hermetic mocks (respx dm20, AsyncMock LLM/Discord, monkeypatched OCR)
# so the runner just executes Python — no external services needed.
name: perf

on:
  schedule:
    # Sunday 02:00 UTC — outside US/EU business hours.
    - cron: "0 2 * * 0"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline-diff:
    name: perf-baseline diff (macos-latest)
    # Schedule + manual dispatch always run; pushes only when "[perf]" is
    # in the commit message. workflow_dispatch lacks head_commit, so guard
    # the check defensively.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[perf]'))
    runs-on: macos-latest
    continue-on-error: true  # informational only — does NOT block release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install project (dev extras)
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run perf-baseline CLI
        # Exit code 0 = within tolerance, 1 = warn (>+10%), 2 = critical (>+25%).
        # `continue-on-error: true` above ensures non-zero doesn't fail the job.
        run: |
          uv run eldritch-dm-perf-baseline \
            --baseline .planning/perf-baseline-v1.9.0.json \
            --output ./perf-runs

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-diff-${{ github.run_id }}
          path: perf-runs/
          retention-days: 30
