# EldritchDM LLM Token Pricing (Phase 13 / MON-03 / database/pricing.yaml)
#
# Loaded by ``eldritch_dm.observability.cost.load_pricing`` using the 3-tier
# path precedence (same pattern as Phase 8 eligibility.yaml + Phase 13 alerts.yaml):
#
#   Tier 1: $ELDRITCH_PRICING_YAML env override
#   Tier 2: ~/.eldritch/pricing.yaml (per-install)
#   Tier 3: database/pricing.yaml (in-repo default — this file)
#
# ⚠ OPERATORS MUST REFRESH THESE VALUES BEFORE PRODUCTION USE ⚠
#
# The values below are PLACEHOLDERS dated 2026-05-24. LLM provider token
# pricing changes monthly; the v1.2 ±5%-accuracy test corpus locks the
# calculator against whatever values are in this file (NOT against a live
# web fetch). Before deploying:
#
#   1. Check current pricing at the provider's docs:
#      - OpenAI:    https://openai.com/api/pricing/
#      - Anthropic: https://www.anthropic.com/pricing#anthropic-api
#   2. Update the `input_per_million_usd` / `output_per_million_usd` rows
#   3. Set `as_of` to today's UTC date
#   4. Re-run `pytest tests/observability/test_cost.py` — the ±5% corpus
#      compares against THIS FILE'S values, so any in-file update flows
#      through to the assertions without code changes
#
# Per-row schema:
#   model:                       string (canonical model id; lowercased on lookup)
#   input_per_million_usd:       decimal (USD per 1M input tokens)
#   output_per_million_usd:      decimal (USD per 1M output tokens)
#   currency:                    "USD" (locked for v1.2)
#   source_url:                  URL to provider's pricing page at the time
#   also_verified_at:            secondary URL (aggregator or community)
#   as_of:                       ISO date — when these numbers were verified
#
# Schema is validated by ``PricingFile`` pydantic v2 with extra='forbid'.
# yaml.safe_load only (RCE-resistant; same CI gate as Phase 8).

version: 1
